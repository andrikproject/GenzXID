<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — GenzXID</title>
  <meta name="robots" content="noindex, follow">
  <meta name="theme-color" content="#0a0a1a">
  <link rel="icon" href="/img/favicon.ico" sizes="32x32">
  <link rel="icon" href="/img/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/img/icon.svg">
  <link rel="stylesheet" href="/styles.css">
  <style>
    .notfound {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
      text-align: center;
      position: relative;
    }
    .notfound-inner {
      max-width: 560px;
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 48px 40px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    .notfound h1 {
      font-size: 5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff 0%, var(--aurora-teal) 50%, var(--aurora-purple) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
      margin-bottom: 8px;
    }
    .notfound h2 { font-size: 1.5rem; margin-bottom: 16px; color: var(--text); }
    .notfound p { color: var(--text-secondary); margin-bottom: 28px; }
    .notfound-links { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    .notfound-links a {
      color: var(--primary-light);
      font-weight: 600;
      padding: 12px 22px;
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      background: rgba(139, 92, 246, 0.05);
      transition: border-color 0.25s ease, box-shadow 0.25s ease, transform 0.25s ease;
    }
    .notfound-links a:hover {
      border-color: rgba(0, 212, 170, 0.3);
      box-shadow: 0 4px 16px rgba(0, 212, 170, 0.1);
      transform: translateY(-2px);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="aurora-bg"></div>
  <div class="aurora-orb aurora-orb-1"></div>
  <div class="aurora-orb aurora-orb-2"></div>
  <div class="aurora-orb aurora-orb-3"></div>
  <main class="notfound">
    <div class="notfound-inner">
      <h1>404</h1>
      <h2>This page drifted out of context.</h2>
      <p>The link you followed either no longer exists or was never here. Head back to the homepage and Kai will help from there.</p>
      <div class="notfound-links">
        <a href="/">Back to GenzXID</a>
        <a href="/run-gemma-locally/">Run Gemma 4 locally</a>
        <a href="/latex-math/">LaTeX math rendering</a>
      </div>
    </div>
  </main>
</body>
</html>
