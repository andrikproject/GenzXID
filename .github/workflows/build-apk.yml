name: Build GenzXID APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: 🔧 Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: 🛠️ Grant execute permission
        run: chmod +x gradlew

      - name: 🔨 Build Debug APK (FOSS flavor)
        run: ./gradlew :androidApp:assembleFossDebug --no-daemon

      - name: 📤 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: GenzXID-Debug
          path: |
            androidApp/build/outputs/apk/foss/debug/*.apk
            androidApp/build/outputs/apk/playStore/debug/*.apk

      - name: 🔨 Build Release APK
        run: ./gradlew :androidApp:assembleFossRelease :androidApp:assemblePlayStoreRelease --no-daemon

      - name: 📤 Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: GenzXID-Release
          path: |
            androidApp/build/outputs/apk/foss/release/*.apk
            androidApp/build/outputs/apk/playStore/release/*.apk
